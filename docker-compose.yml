services:
  ollama:
    image: ollama/ollama
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama
    environment:
      OLLAMA_CONTEXT_LENGTH: 32768
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_FLASH_ATTENTION: 1
      OLLAMA_KV_CACHE_TYPE: q8_0
      OLLAMA_KEEP_ALIVE: 5m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ai-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:11435:11435"
    environment:
      OLLAMA_URL: http://ollama:11434
      REVIEW_MODEL: ${REVIEW_MODEL:-qwen3:14b}
      TRANSLATE_MODEL: ${TRANSLATE_MODEL:-translategemma:12b}
    depends_on:
      - ollama

volumes:
  ollama:
